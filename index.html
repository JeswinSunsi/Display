<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Yearly Badge</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap");

      :root {
        --bg-1: #0a0f1d;
        --bg-2: #121929;
        --surface: #10192b;
        --surface-soft: #18233a;
        --text: #ebf2ff;
        --muted: #9db0d0;
        --primary: #2dd4bf;
        --primary-strong: #14b8a6;
        --warning: #f59e0b;
        --danger: #fb7185;
        --border: #26344f;
        --shadow: 0 22px 60px rgba(0, 0, 0, 0.45);
        --focus-ring: 0 0 0 3px rgba(45, 212, 191, 0.32);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        min-height: 100vh;
        background:
          radial-gradient(circle at 15% 15%, rgba(45, 212, 191, 0.16), transparent 34%),
          radial-gradient(circle at 90% 0%, rgba(56, 189, 248, 0.14), transparent 36%),
          linear-gradient(130deg, var(--bg-1), var(--bg-2));
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      main {
        width: 100%;
        max-width: 720px;
        animation: fadeUp 0.55s ease-out;
      }
      .card {
        position: relative;
        background: linear-gradient(165deg, rgba(16, 25, 43, 0.9), rgba(10, 15, 29, 0.92));
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 34px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(110deg, rgba(45, 212, 191, 0.08), transparent 55%);
        pointer-events: none;
      }
      .header-content {
        margin-bottom: 22px;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 2rem;
        letter-spacing: -0.02em;
        font-weight: 700;
        color: #f8fbff;
      }
      .header-content p {
        margin: 0;
        color: var(--muted);
        font-size: 0.98rem;
        line-height: 1.5;
      }

      .status-bar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 12px;
        background: rgba(24, 35, 58, 0.66);
        margin-bottom: 18px;
      }
      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        border: 1px solid #2f466e;
        background: rgba(24, 35, 58, 0.8);
        padding: 5px 11px;
        font-size: 0.8rem;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        color: #c6d5ef;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--warning);
      }
      .status-pill.connected .status-dot {
        background: var(--primary);
      }
      .user-chip {
        font-family: "IBM Plex Mono", Consolas, monospace;
        font-size: 0.85rem;
        color: #d3e4ff;
      }

      .controls {
        display: flex;
        gap: 12px;
        margin-bottom: 18px;
      }
      .stat-picker {
        margin-bottom: 18px;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        background: rgba(24, 35, 58, 0.5);
      }
      .stat-picker legend {
        font-size: 0.875rem;
        font-weight: 700;
        color: #d2def3;
        padding: 0 6px;
      }
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px 14px;
      }
      .stat-item {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #d7e5fd;
        font-size: 0.92rem;
        user-select: none;
      }
      .stat-item input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--primary);
      }
      .controls-row {
        display: flex;
        gap: 12px;
        width: 100%;
      }
      .input-group {
        display: flex;
        flex-direction: column;
        flex: 1;
        gap: 6px;
      }
      label {
        font-size: 0.875rem;
        font-weight: 600;
        color: #d2def3;
      }
      input, select {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 1rem;
        background: var(--surface-soft);
        color: var(--text);
        transition: border-color 0.2s, box-shadow 0.2s;
        font-family: "IBM Plex Mono", Consolas, monospace;
      }
      input:focus-visible, select:focus-visible {
        outline: none;
        border-color: var(--primary);
        box-shadow: var(--focus-ring);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .btn {
        border: 0;
        border-radius: 10px;
        padding: 11px 14px;
        font-size: 0.96rem;
        font-weight: 700;
        cursor: pointer;
        transition: background-color 0.2s, transform 0.1s, border-color 0.2s;
        min-height: 42px;
      }
      .btn:active {
        transform: translateY(1px);
      }
      .btn-primary {
        background: linear-gradient(180deg, #2dd4bf, #14b8a6);
        color: #fff;
        flex: 1;
      }
      .btn-primary:hover {
        background: var(--primary-strong);
      }
      .btn-secondary {
        background: transparent;
        border: 1px solid #37537f;
        color: #c3d6f8;
      }
      .btn-secondary:hover {
        border-color: #4c709d;
      }
      .btn-danger {
        background: transparent;
        border: 1px solid #7f3f59;
        color: #f3c4d0;
      }
      .btn-danger:hover {
        border-color: #ad4d6d;
      }

      #previewSection {
        margin-top: 26px;
        border-top: 1px solid var(--border);
        padding-top: 22px;
        display: none;
      }
      .preview-header {
        font-size: 1.16rem;
        font-weight: 600;
        margin: 0 0 12px;
        color: #f1f6ff;
      }

      .badge-single-frame {
        background: radial-gradient(circle at 20% 10%, rgba(56, 189, 248, 0.14), transparent 50%), var(--surface-soft);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 16px;
      }
      .badge-single-frame img {
        max-width: 100%;
        height: auto;
        border-radius: 10px;
        box-shadow: 0 6px 22px rgba(0,0,0,0.38);
      }

      .snippet-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 9px;
      }
      .snippet-header h3 {
        font-size: 1rem;
        font-weight: 600;
        margin: 0;
        color: #e6efff;
      }
      .copy-btn {
        background: transparent;
        color: #d4e2fb;
        border: 1px solid #37537f;
        padding: 6px 12px;
        font-size: 0.875rem;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 500;
        transition: all 0.2s;
      }
      .copy-btn:hover {
        border-color: #4c709d;
        color: #ecf4ff;
      }
      .copy-btn.copied {
        background: rgba(45, 212, 191, 0.12);
        color: #8bf3e6;
        border-color: #2dd4bf;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-all;
        background: #0c1425;
        color: #dff0ff;
        border-radius: 10px;
        border: 1px solid #22314f;
        padding: 16px;
        font-size: 0.875rem;
        font-family: "IBM Plex Mono", Consolas, monospace;
        line-height: 1.5;
        transition: box-shadow 0.2s;
      }

      .hint {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .notice {
        margin: 0 0 14px;
        border: 1px solid #32506c;
        background: rgba(56, 189, 248, 0.08);
        color: #cde8ff;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 0.9rem;
        display: none;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @media (max-width: 480px) {
        .controls-row {
          flex-direction: column;
        }
        .stat-grid {
          grid-template-columns: 1fr;
        }
        .actions {
          flex-direction: column;
        }
        .card { padding: 24px 20px; }
        h1 {
          font-size: 1.65rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <div class="header-content">
          <h1>Build Your GitHub Yearly Badge</h1>
          <p>Authenticate once with OAuth, then generate a clean README badge.</p>
        </div>

        <div id="notice" class="notice"></div>

        <div class="status-bar">
          <div id="statusPill" class="status-pill">
            <span class="status-dot"></span>
            <span id="statusText">Not connected</span>
          </div>
          <div id="userChip" class="user-chip">No account linked</div>
        </div>

        <div class="controls">
          <div class="controls-row">
            <div class="input-group">
              <label for="theme">Theme</label>
              <select id="theme">
                <option value="dark">Dark</option>
                <option value="hacker">Hacker</option>
              </select>
            </div>
            
            <div class="input-group">
              <label for="year">Lock to Year</label>
              <select id="year">
                <option value="live">Current (Live)</option>
              </select>
            </div>
          </div>
        </div>

        <fieldset class="stat-picker">
          <legend>Stats to display</legend>
          <div class="stat-grid">
            <label class="stat-item"><input type="checkbox" value="commits" checked />Commits</label>
            <label class="stat-item"><input type="checkbox" value="prs" checked />Pull Requests</label>
            <label class="stat-item"><input type="checkbox" value="issues" checked />Issues</label>
            <label class="stat-item"><input type="checkbox" value="reviews" checked />Reviews</label>
            <label class="stat-item"><input type="checkbox" value="repos" checked />Total Repos</label>
            <label class="stat-item"><input type="checkbox" value="stars" checked />Total Stars</label>
          </div>
        </fieldset>

        <div class="actions">
          <button id="connect" class="btn btn-primary">Connect with GitHub</button>
        </div>

        <div id="previewSection">
          <h3 class="preview-header">Live Preview</h3>
          <div class="badge-single-frame">
            <img id="badgePreviewImg" alt="GitHub badge preview" />
          </div>

          <div class="snippet-header">
            <h3>Markdown Snippet</h3>
            <button id="copyBtn" class="copy-btn">Copy</button>
          </div>
          <pre id="snippet"></pre>
        </div>
      </div>
    </main>

    <script>
      const themeSelect = document.getElementById("theme");
      const yearSelect = document.getElementById("year");
      const connectBtn = document.getElementById("connect");
      const statCheckboxes = Array.from(document.querySelectorAll('.stat-picker input[type="checkbox"]'));
      const previewSection = document.getElementById("previewSection");
      const badgePreviewImg = document.getElementById("badgePreviewImg");
      const snippet = document.getElementById("snippet");
      const copyBtn = document.getElementById("copyBtn");
      const statusPill = document.getElementById("statusPill");
      const statusText = document.getElementById("statusText");
      const userChip = document.getElementById("userChip");
      const notice = document.getElementById("notice");

      const STORED_USERNAME_KEY = "githubBadgeConnectedUser";
      let activeUsername = "";

      // Populate years dynamically
      const currentYear = new Date().getUTCFullYear();
      for (let y = currentYear; y >= 2008; y--) {
        const opt = document.createElement("option");
        opt.value = y;
        opt.textContent = y;
        yearSelect.appendChild(opt);
      }

      function getSelectedStats() {
        return statCheckboxes.filter((box) => box.checked).map((box) => box.value);
      }

      function buildUrls(username, theme, lockYear, selectedStats) {
        const base = window.location.origin;
        let params = [];
        params.push("username=" + encodeURIComponent(username));
        if (theme && theme !== "dark") params.push("theme=" + encodeURIComponent(theme));
        if (lockYear && lockYear !== "live") params.push("year=" + encodeURIComponent(lockYear));
        if (selectedStats && selectedStats.length) {
          params.push("fields=" + encodeURIComponent(selectedStats.join(",")));
        }
        
        return base + "/badge?" + params.join("&");
      }

      function setNotice(message) {
        if (!message) {
          notice.style.display = "none";
          notice.textContent = "";
          return;
        }
        notice.textContent = message;
        notice.style.display = "block";
      }

      function setConnectionState(username) {
        activeUsername = (username || "").trim().toLowerCase();
        const isConnected = Boolean(activeUsername);

        statusPill.classList.toggle("connected", isConnected);
        statusText.textContent = isConnected ? "Connected" : "Not connected";
        userChip.textContent = isConnected ? "@" + activeUsername : "No account linked";
        connectBtn.textContent = "Connect with GitHub";
      }

      function updateUI() {
        const theme = themeSelect.value;
        const lockYear = yearSelect.value;
        const user = activeUsername;
        const selectedStats = getSelectedStats();

        if (!user) {
          previewSection.style.display = "none";
          snippet.textContent = "";
          return;
        }

        const url = buildUrls(user, theme, lockYear, selectedStats);

        // Update Image
        badgePreviewImg.src = url;

        snippet.textContent = "![" + user + " GitHub Stats](" + url + ")";

        previewSection.style.display = "block";
      }

      function refreshFromQuery() {
        const q = new URLSearchParams(window.location.search);
        const connected = q.get("connected") === "1";
        const user = (q.get("username") || "").trim().toLowerCase();
        const theme = (q.get("theme") || "").toLowerCase();
        const yr = q.get("year");

        if (theme) themeSelect.value = theme;
        if (yr && Array.from(yearSelect.options).some(o => o.value === yr)) {
          yearSelect.value = yr;
        }

        const stored = (localStorage.getItem(STORED_USERNAME_KEY) || "").trim().toLowerCase();
        const resolvedUser = user || stored;

        if (connected && user) {
          setNotice("GitHub connected successfully.");
          localStorage.setItem(STORED_USERNAME_KEY, user);
        }

        if (q.has("connected") || q.has("username")) {
          const next = window.location.pathname;
          window.history.replaceState({}, "", next);
        }

        setConnectionState(resolvedUser);
        updateUI();
      }

      themeSelect.addEventListener("change", updateUI);
      yearSelect.addEventListener("change", updateUI);
      statCheckboxes.forEach((checkbox) =>
        checkbox.addEventListener("change", () => {
          const selectedCount = getSelectedStats().length;
          if (selectedCount === 0) {
            checkbox.checked = true;
            setNotice("Select at least one stat to build the card.");
            return;
          }
          updateUI();
        })
      );

      copyBtn.addEventListener("click", () => {
        if (!snippet.textContent) return;
        navigator.clipboard.writeText(snippet.textContent).then(() => {
          copyBtn.textContent = "Copied!";
          copyBtn.classList.add("copied");
          setTimeout(() => {
            copyBtn.textContent = "Copy";
            copyBtn.classList.remove("copied");
          }, 2000);
        });
      });

      connectBtn.addEventListener("click", () => {
        window.location.href = "/auth/github";
      });

      refreshFromQuery();
    </script>
  </body>
</html>
