<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Yearly Badge OAuth</title>
    <style>
      :root {
        --bg: #f2f6fb;
        --panel: #ffffff;
        --text: #1f2328;
        --muted: #59636e;
        --primary: #1166c6;
        --primary-strong: #0b4ea3;
        --primary-soft: #d9e9ff;
        --border: #d0d7de;
        --shadow: 0 20px 50px rgba(17, 102, 198, 0.16);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
        min-height: 100vh;
        background:
          radial-gradient(circle at 10% 10%, #eaf3ff 0%, rgba(234, 243, 255, 0) 40%),
          radial-gradient(circle at 90% 25%, #dff0ff 0%, rgba(223, 240, 255, 0) 30%),
          linear-gradient(160deg, #f6f9ff 0%, var(--bg) 58%, #edf4ff 100%);
        color: var(--text);
        overflow-x: hidden;
      }
      body::before,
      body::after {
        content: "";
        position: fixed;
        width: 360px;
        height: 360px;
        border-radius: 50%;
        pointer-events: none;
        z-index: -1;
        filter: blur(30px);
        opacity: 0.45;
      }
      body::before {
        background: #bfe4ff;
        top: -130px;
        left: -80px;
        animation: driftOne 18s ease-in-out infinite alternate;
      }
      body::after {
        background: #c8ddff;
        bottom: -160px;
        right: -90px;
        animation: driftTwo 22s ease-in-out infinite alternate;
      }
      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 40px 20px 60px;
        animation: fadeUp 700ms ease-out;
      }
      .card {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.88));
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 26px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(6px);
        position: relative;
      }
      h1 {
        margin-top: 0;
        margin-bottom: 10px;
        font-size: clamp(1.6rem, 1.1rem + 1.8vw, 2.2rem);
        line-height: 1.15;
      }
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      input,
      select {
        flex: 1;
        min-width: 220px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 15px;
        background: #fff;
        transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
      }
      button {
        border: 0;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--primary), var(--primary-strong));
        color: #fff;
        padding: 10px 14px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 160ms ease, box-shadow 200ms ease, filter 180ms ease;
      }
      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 24px rgba(17, 102, 198, 0.35);
        filter: saturate(1.06);
      }
      button:active {
        transform: translateY(0);
      }
      input:focus-visible,
      select:focus-visible,
      button:focus-visible {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px var(--primary-soft);
      }
      code {
        background: #f0f6ff;
        border: 1px solid #c6e0ff;
        border-radius: 8px;
        padding: 2px 6px;
      }
      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        background:
          linear-gradient(180deg, #fbfdff 0%, #f7faff 100%);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        transition: border-color 180ms ease, box-shadow 180ms ease;
      }
      pre.flash {
        animation: snippetGlow 450ms ease;
      }
      .muted { color: var(--muted); }

      .badge-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin: 12px 0 18px;
      }

      .badge-frame {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: linear-gradient(180deg, #f9fcff 0%, #f1f7ff 100%);
        padding: 10px;
        min-height: 88px;
        position: relative;
        overflow: hidden;
      }

      .badge-frame::before {
        content: "";
        position: absolute;
        inset: -70% -20% auto;
        height: 160%;
        background: linear-gradient(100deg, rgba(255, 255, 255, 0) 20%, rgba(255, 255, 255, 0.58) 50%, rgba(255, 255, 255, 0) 80%);
        transform: translateX(-65%);
        animation: badgeShine 3.2s ease-in-out infinite;
        pointer-events: none;
      }

      .badge-frame strong {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 8px;
      }

      .badge-frame img {
        width: 100%;
        max-width: 340px;
        height: auto;
        display: block;
        border-radius: 8px;
      }

      .badge-float {
        animation: badgeFloat 3.6s ease-in-out infinite;
      }

      .badge-breath {
        animation: badgeBreath 2.8s ease-in-out infinite;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes snippetGlow {
        0% {
          border-color: #9bc4ff;
          box-shadow: 0 0 0 0 rgba(17, 102, 198, 0.25);
        }
        100% {
          border-color: var(--border);
          box-shadow: 0 0 0 10px rgba(17, 102, 198, 0);
        }
      }

      @keyframes driftOne {
        from { transform: translate(0, 0) scale(1); }
        to { transform: translate(35px, 25px) scale(1.08); }
      }

      @keyframes driftTwo {
        from { transform: translate(0, 0) scale(1); }
        to { transform: translate(-28px, -20px) scale(1.1); }
      }

      @keyframes badgeShine {
        0% { transform: translateX(-65%); opacity: 0; }
        15% { opacity: 1; }
        60% { opacity: 1; }
        100% { transform: translateX(95%); opacity: 0; }
      }

      @keyframes badgeFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-3px); }
      }

      @keyframes badgeBreath {
        0%, 100% { transform: scale(1); filter: saturate(1); }
        50% { transform: scale(1.012); filter: saturate(1.05); }
      }

      @media (max-width: 720px) {
        .card {
          padding: 20px;
          border-radius: 14px;
        }

        .badge-grid {
          grid-template-columns: 1fr;
        }

        button {
          width: 100%;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <h1>GitHub Yearly Badge OAuth</h1>
        <p class="muted">
          Connect your GitHub account, then copy your badge endpoint URLs into your README.
        </p>

        <div class="row">
          <input id="username" placeholder="github username" />
          <select id="theme">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
            <option value="dracula">Dracula</option>
            <option value="synthwave">Synthwave</option>
            <option value="cyberpunk">Cyberpunk</option>
            <option value="hacker">Hacker</option>
            <option value="ocean">Ocean</option>
            <option value="sunset">Sunset</option>
            <option value="minimalist">Minimalist</option>
            <option value="retro">Retro</option>
            <option value="space">Space</option>
          </select>
          <button id="connect">Connect with GitHub</button>
        </div>

        <h3>Badge Preview</h3>
        <div class="badge-grid" id="badgePreview" style="display: none;">
          <div class="badge-frame">
            <strong>Current Year (live)</strong>
            <img id="badgeLive" class="badge-float" alt="Live GitHub badge preview" />
          </div>
          <div class="badge-frame">
            <strong>Locked Year</strong>
            <img id="badgeYear" class="badge-breath" alt="Year-locked GitHub badge preview" />
          </div>
        </div>

        <h3>Generated README Snippet</h3>
        <pre id="snippet">Enter username above to generate badge snippet.</pre>
      </div>
    </main>

    <script>
      const usernameInput = document.getElementById("username");
      const themeSelect = document.getElementById("theme");
      const connectBtn = document.getElementById("connect");
      const snippet = document.getElementById("snippet");
      const badgePreview = document.getElementById("badgePreview");
      const badgeLive = document.getElementById("badgeLive");
      const badgeYear = document.getElementById("badgeYear");

      function animateSnippet() {
        snippet.classList.remove("flash");
        void snippet.offsetWidth;
        snippet.classList.add("flash");
      }

      function buildBadgeUrls(username, theme) {
        const base = window.location.origin;
        let badge = `${base}/badge?username=${encodeURIComponent(username)}`;
        if (theme && theme !== "dark") badge += `&theme=${theme}`;
        const year = new Date().getUTCFullYear();
        return {
          live: badge,
          locked: `${badge}&year=${year}`,
        };
      }

      function refreshBadgePreview(username, theme) {
        if (!username) {
          badgePreview.style.display = "none";
          badgeLive.removeAttribute("src");
          badgeYear.removeAttribute("src");
          return;
        }
        const urls = buildBadgeUrls(username, theme);
        badgeLive.src = urls.live;
        badgeYear.src = urls.locked;
        badgePreview.style.display = "grid";
      }

      function buildSnippet(username, theme) {
        const urls = buildBadgeUrls(username, theme);

        return [
          `![${username} GitHub Stats](${urls.live})`,
          "",
          `<!-- Optional: lock to a year -->`,
          `![${username} GitHub Stats ${new Date().getUTCFullYear()}](${urls.locked})`,
        ].join("\\n");
      }

      function refreshFromQuery() {
        const q = new URLSearchParams(window.location.search);
        const user = (q.get("username") || "").trim().toLowerCase();
        const theme = (q.get("theme") || "dark").toLowerCase();
        if (themeSelect) themeSelect.value = theme;
        if (user) {
          usernameInput.value = user;
          snippet.textContent = buildSnippet(user, theme);
          refreshBadgePreview(user, theme);
          animateSnippet();
        }
      }

      connectBtn.addEventListener("click", () => {
        const username = usernameInput.value.trim().toLowerCase();
        const theme = themeSelect.value;
        if (!username) {
          alert("Enter a GitHub username first.");
          return;
        }
        snippet.textContent = buildSnippet(username, theme);
        refreshBadgePreview(username, theme);
        animateSnippet();
        window.location.href = `/auth/github?username=${encodeURIComponent(username)}`;
      });

      function handleInput() {
        const username = usernameInput.value.trim().toLowerCase();
        const theme = themeSelect.value;
        if (!username) {
          snippet.textContent = "Enter username above to generate badge snippet.";
          refreshBadgePreview("", theme);
          return;
        }
        snippet.textContent = buildSnippet(username, theme);
        refreshBadgePreview(username, theme);
        animateSnippet();
      }

      usernameInput.addEventListener("input", handleInput);
      themeSelect.addEventListener("change", handleInput);

      refreshFromQuery();
    </script>
  </body>
</html>
